apiVersion: orkestra.orkspace.io/v1
kind: Simulate
metadata:
  name: database-hooks-sim
  description: Verify typed hooks fire — StatefulSet, Service, and backup CronJob created on cycle 1

spec:
  katalog: ./katalog.yaml
  cr: ./cr.yaml
  cycles: 5

  # Requires a compiled binary with the type registry.
  # Run `make build` before `ork simulate -f simulate.yaml`.
  expect:
    steady: true
    noErrors: true
    ops:
      - cycle: 1
        verb: create
        resource: statefulsets
      - cycle: 1
        verb: create
        resource: services
      - cycle: 1
        verb: create
        resource: cronjobs
        name: my-db-backup
