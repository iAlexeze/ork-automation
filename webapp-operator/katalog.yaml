apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: webapp-operator
  namespace: api-team
  version: v1.0.0
  description: >
    WebApp operator built from the web-service motif. Exposes a single CRD —
    WebApp — that deploys any container image as a stateless web service.
    Optionally creates an Ingress when spec.host is set.
  author: ialexeze
  license: Apache-2.0
  tags:
    - web
    - stateless
    - ingress
    - beginner

spec:
  crds:
    webapp:
      apiTypes:
        group: rkguide.demo
        version: v1
        kind: WebApp
        plural: webapps
      workers: 2
      resync: 1m

      # Import the web-service motif and wire its inputs to spec fields.
      # The motif provides the Deployment, Service, and optional Ingress.
      imports:
        - motif: oci://ghcr.io/ialexeze/motifs/web-service:v1.1.0
          with:
            image: "{{ .spec.image }}"
            port: "{{ .spec.port }}"
            replicas: "{{ .spec.replicas }}"
            host: "{{ .spec.host }}"
            resourceProfile: "{{ .spec.resourceProfile }}"

      operatorBox:
        default: true
        status:
          fields:
            - path: phase
              value: "Running"
            - path: ready
              value: "{{ allReplicasReady .children.deployment }}"
            - path: endpoint
              value: "http://{{ .metadata.name }}-svc.{{ .metadata.namespace }}.svc.cluster.local"