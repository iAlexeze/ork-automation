  publish-pattern:
    name: Validate and publish katalog
    runs-on: ubuntu-latest
  #  needs: publish-image
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./database-operator/go.mod
          cache: true
          cache-dependency-path: ./database-operator/go.sum

      # Ensure ~/.orkestra/bin is in PATH so the cached binary is visible to the
      # publish action below without it needing to reinstall.
      - name: Add ork to PATH
        run: echo "$HOME/.orkestra/bin" >> $GITHUB_PATH

      # Cache the full CLI binary (with type registry compiled in) by source hash.
      # On hit, the custom ork is ready in PATH — skip generate and build entirely.
      - name: Cache full CLI binary
        id: cache-cli
        uses: actions/cache@v5
        with:
          path: ~/.orkestra/bin/ork
          key: cli-binary-${{ hashFiles('database-operator/go.sum', 'database-operator/**/*.go', 'database-operator/katalog.yaml') }}

      # Generate pkg/typeregistry/zz_generated_typeregistry.go from katalog.yaml.
      # Only needed when rebuilding the binary.
      - name: Generate runtime registry
        if: steps.cache-cli.outputs.cache-hit != 'true'
        uses: orkspace/orkestra-action@v1
        with:
          generate-registry: "."
          working-directory: ./database-operator

      # Build the full CLI (all commands: validate, simulate, e2e, run, etc.)
      # with the type registry compiled in. Replaces the standard ork installed
      # by the action above so the publish step uses our custom binary.
      - name: Build full CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        working-directory: database-operator
        run: make build

      # Validate, simulate, and push. The image is already in the registry from
      # publish-image. Katalog is published last so consumers always pull both atomically.
      - name: Publish to registry
        uses: orkspace/orkestra-action@v1
        with:
          template: "true"
          validate: "true"
          simulate: "true"
          registry-push: "database-operator:${{ github.ref_name }} ."
          registry-url: "ghcr.io/${{ github.repository_owner }}/katalogs"
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.ORK_ACTION_TOKEN }}
          working-directory: ./database-operator
