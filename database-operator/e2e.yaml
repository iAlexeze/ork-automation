apiVersion: orkestra.orkspace.io/v1
kind: E2E
metadata:
  name: database-hooks-e2e
  description: Exercise typed Go hooks — verify StatefulSet, Service, and CronJob are created and cleaned up

spec:
  katalog: ./katalog.yaml
  crd: ./crd.yaml
  cr: ./cr.yaml

  valuesFiles:
    - ./values.yaml

  cluster:
    provider: kind
    name: ork-e2e
    reuse: false

  expect:
    - name: Database StatefulSet and backup CronJob created
      after: cr-applied
      timeout: 90s
      resources:
        - kind: StatefulSet
          namespace: default
          ready: true
        - kind: CronJob
          name: my-db-backup
          namespace: default

    - name: StatefulSet and CronJob removed on delete
      after: cr-deleted
      timeout: 30s
      resources:
        - kind: StatefulSet
          namespace: default
          count: 0
        - kind: CronJob
          namespace: default
          name: my-db-backup
          count: 0
