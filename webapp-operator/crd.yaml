apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: webapps.rkguide.demo
spec:
  group: rkguide.demo
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  description: Container image to run (e.g. ghcr.io/orkspace/orkestra-dev-server:0.7.5)
                port:
                  type: integer
                  default: 8080
                  description: Container port the application listens on
                replicas:
                  type: integer
                  default: 1
                  description: Number of replicas
                host:
                  type: string
                  default: ""
                  description: Ingress hostname — when set, an Ingress is created
                resourceProfile:
                  type: string
                  default: small
                  enum: [small, standard, burst]
                  description: CPU/memory resource profile
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  names:
    kind: WebApp
    plural: webapps
    singular: webapp
  scope: Namespaced