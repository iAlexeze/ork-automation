apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: database-operator
  namespace: data-team
  author: ialexeze
  version: v1.0.0
  description: >
    Typed Go hooks for the Database CRD. Demonstrates apiTypes.location,
    ork generate registry, and OrkestraRegistry usage from Go.

spec:
  crds:
    database:
      apiTypes:
        group: rkguide.demo
        version: v1alpha1
        kind: Database
        plural: databases
        object: Database
        objectList: DatabaseList
        # location enables typed mode — the informer decodes API server
        # responses into *rkguidev1alpha1.Database rather than *unstructured.Unstructured.
        # Required when hooks need type-safe struct access.
        # After setting this, run: ork generate registry --file katalog.yaml
        location: github.com/orkspace/orkestra-registry-guide/api/v1alpha1
        alias: rkguidev1alpha1

      workers: 3
      resync: 30s

      operatorBox:
        default: true   # GenericReconciler is still used — hooks are additive

        # Hooks run INSTEAD OF declarative templates when OnReconcile is defined.
        # The hook calls OrkestraRegistry directly for Kubernetes resources.
        hooks:
          location: github.com/orkspace/orkestra-registry-guide/hooks
          function: DatabaseHooks
          alias: dbhooks
          resources:          # Resources managed by this hook — required for RBAC generation
            - kind: StatefulSet
            - kind: Service
            - kind: CronJob

        # Status Layer 1 (Ready condition) is always automatic.
        # Layer 2 fields are written after the hook completes.
        status:
          fields:
            - path: phase
              value: "Running"
            - path: engine
              value: "{{ .spec.engine }}"
            - path: endpoint
              value: "{{ .metadata.name }}-svc.{{ .metadata.namespace }}.svc.cluster.local"
