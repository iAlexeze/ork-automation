apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databases.rkguide.demo
spec:
  group: rkguide.demo
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [engine, storage]
              properties:
                engine:
                  type: string
                  enum: [postgres, mysql]
                  description: Database engine
                version:
                  type: string
                  description: Engine version (e.g. "14" for postgres:14)
                storage:
                  type: string
                  description: Persistent volume size (e.g. "10Gi")
                backup:
                  type: boolean
                  default: false
                  description: Enable automated backup CronJob
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  names:
    kind: Database
    plural: databases
    singular: database
  scope: Namespaced
