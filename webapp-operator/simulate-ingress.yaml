apiVersion: orkestra.orkspace.io/v1
kind: Simulate
metadata:
  name: webapp-ingress-sim
  description: >
    Verify Ingress IS created when spec.host is non-empty.

spec:
  katalog: ./katalog.yaml
  cr: ./cr-with-ingress.yaml
  cycles: 3

  expect:
    steady: true
    noErrors: true
    ops:
      - cycle: 1
        verb: create
        resource: deployments
        name: my-webapp
      - cycle: 1
        verb: create
        resource: services
        name: my-webapp-svc
      - cycle: 1
        verb: create
        resource: ingresses
        name: my-webapp-ingress