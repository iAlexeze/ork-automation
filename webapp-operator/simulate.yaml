apiVersion: orkestra.orkspace.io/v1
kind: Simulate
metadata:
  name: webapp-sim
  description: >
    Verify the web-service motif produces a Deployment and Service on cycle 1.
    Ingress must NOT be created because spec.host is empty.

spec:
  katalog: ./katalog.yaml
  cr: ./cr.yaml
  cycles: 3

  expect:
    steady: true
    noErrors: true
    ops:
      - cycle: 1
        verb: create
        resource: deployments
        name: my-webapp
      - cycle: 1
        verb: create
        resource: services
        name: my-webapp-svc