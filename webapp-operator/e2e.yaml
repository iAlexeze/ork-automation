apiVersion: orkestra.orkspace.io/v1
kind: E2E
metadata:
  name: webapp-e2e
  description: End-to-end test for the webapp-operator pattern
spec:
  cluster:
    name: ork-e2e-webapp
    provider: kind
    reuse: false
  katalog: ./katalog.yaml
  crd: ./crd.yaml
  cr: ./cr.yaml
  expect:
    - name: "WebApp CR created"
      after: cr-applied
      timeout: 30s
      resources:
        - kind: WebApp
          name: my-webapp
          namespace: default

    - name: "Deployment running"
      after: cr-applied
      timeout: 120s
      resources:
        - kind: Deployment
          name: my-webapp
          namespace: default
          ready: true

    - name: "Service exists"
      after: cr-applied
      timeout: 30s
      resources:
        - kind: Service
          name: my-webapp-svc
          namespace: default

    - name: "Ingress absent when host empty"
      after: cr-applied
      timeout: 30s
      resources:
        - kind: Ingress
          name: my-webapp-ingress
          namespace: default
          count: 0

    - name: "WebApp CR deleted"
      after: cr-deleted
      timeout: 60s
      resources:
        - kind: WebApp
          name: my-webapp
          namespace: default
          count: 0

    - name: "Deployment removed"
      after: cr-deleted
      timeout: 60s
      resources:
        - kind: Deployment
          name: my-webapp
          namespace: default
          count: 0